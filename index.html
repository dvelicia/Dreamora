<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Sebelum Tidur</title>
<style>
  :root{
    --sky-deep: #1a1a3e;
    --sky-mid: #2d2b5e;
    --sky-soft: #4a4785;
    --star-gold: #f5d68c;
    --star-soft: #fff2d0;
    --text-main: #f4f1fa;
    --text-soft: #c9c5e8;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(245,214,140,0.25);
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at top, var(--sky-mid) 0%, var(--sky-deep) 55%, #0f0e28 100%);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    color: var(--text-main);
    overflow-x:hidden;
    position:relative;
  }

  #stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
  }

  .star{
    position:absolute;
    background: var(--star-soft);
    border-radius:50%;
    animation: twinkle 3.5s ease-in-out infinite;
  }

  @keyframes twinkle{
    0%,100%{ opacity:0.25; transform:scale(0.85); }
    50%{ opacity:1; transform:scale(1.15); }
  }

  @media (prefers-reduced-motion: reduce){
    .star{ animation:none; opacity:0.6; }
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:640px;
    margin:0 auto;
    padding: 48px 24px 80px;
  }

  header.site{
    text-align:center;
    margin-bottom:40px;
  }

  .moon{
    font-size:38px;
    display:block;
    margin-bottom:10px;
    filter: drop-shadow(0 0 12px rgba(245,214,140,0.5));
  }

  h1.site-title{
    font-family: 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
    font-weight:400;
    font-size: clamp(28px, 6vw, 38px);
    letter-spacing: 0.02em;
    margin: 0 0 8px;
    color: var(--star-soft);
  }

  .site-sub{
    font-family: Georgia, serif;
    font-style: italic;
    color: var(--text-soft);
    font-size: 16px;
    margin:0;
  }

  /* ---- CATEGORY FILTER ---- */
  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom: 32px;
  }

  .filter-btn{
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: var(--text-soft);
    background: transparent;
    border: 1px solid var(--card-border);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    white-space: nowrap;
  }

  .filter-btn:hover{
    background: rgba(255,255,255,0.08);
    color: var(--star-soft);
  }

  .filter-btn:focus-visible{
    outline: none;
    box-shadow: 0 0 0 2px var(--star-gold);
  }

  .filter-btn.active{
    background: var(--star-gold);
    border-color: var(--star-gold);
    color: var(--sky-deep);
    font-weight: bold;
  }

  /* ---- LIST VIEW ---- */
  .story-list{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap:12px;
  }

  .story-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 14px 16px;
    cursor:pointer;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    display:flex;
    align-items:center;
    gap:12px;
  }

  .story-card:hover, .story-card:focus-visible{
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    outline: none;
  }

  .story-card:focus-visible{
    box-shadow: 0 0 0 2px var(--star-gold), 0 8px 24px rgba(0,0,0,0.35);
  }

  .card-icon{
    font-size: 22px;
    flex-shrink:0;
    filter: drop-shadow(0 0 6px rgba(245,214,140,0.4));
  }

  .card-text{ flex:1; min-width:0; }

  .card-title{
    margin:0;
    font-size:16px;
    color: var(--star-soft);
    font-weight:normal;
    line-height:1.3;
  }

  .card-desc{ display:none; }

  .card-arrow{
    color: var(--star-gold);
    font-size:16px;
    opacity:0.7;
    flex-shrink:0;
  }

  /* empty state for future stories */
  .story-empty{
    text-align:center;
    color: var(--text-soft);
    font-style: italic;
    font-size:14px;
    margin-top: 28px;
    opacity:0.7;
  }

  /* ---- READER VIEW ---- */
  .reader{ display:none; }
  .reader.active{ display:block; }
  .story-list-view.hidden{ display:none; }

  .back-btn{
    background:none;
    border:1px solid var(--card-border);
    color: var(--text-soft);
    font-family: -apple-system, sans-serif;
    font-size:14px;
    padding:8px 16px;
    border-radius: 999px;
    cursor:pointer;
    margin-bottom: 28px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .back-btn:hover{ background: rgba(255,255,255,0.08); color: var(--star-soft); }

  .story-title{
    font-size: clamp(24px, 6vw, 32px);
    color: var(--star-soft);
    text-align:center;
    font-weight:normal;
    margin: 0 0 6px;
  }

  .story-kicker{
    text-align:center;
    font-family:-apple-system, sans-serif;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: var(--star-gold);
    opacity:0.75;
    margin-bottom: 36px;
  }

  .story-body p{
    font-size: 19px;
    line-height: 1.9;
    color: var(--text-main);
    text-align:center;
    margin: 0 0 8px;
  }

  .divider{
    text-align:center;
    color: var(--star-gold);
    opacity:0.5;
    margin: 26px 0;
    font-size:14px;
    letter-spacing: 6px;
  }

  .story-note{
    margin-top: 44px;
    padding-top: 20px;
    border-top: 1px solid var(--card-border);
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    line-height:1.6;
    color: var(--text-soft);
    font-style: italic;
    text-align:center;
  }

  footer.site{
    text-align:center;
    margin-top:60px;
    font-family:-apple-system, sans-serif;
    font-size:12px;
    color: var(--text-soft);
    opacity:0.5;
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">

  <footer class="site">dibacakan pelan-pelan, ditemani cahaya redup 🌙</footer>
</div>

  // ---- render bintang latar ----
  const starsContainer = document.getElementById('stars');
  const STAR_COUNT = 60;
  for(let i=0;i<STAR_COUNT;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2.2 + 1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3.5)+'s';
    s.style.animationDuration = (2.5 + Math.random()*3)+'s';
    starsContainer.appendChild(s);
  }

  // ---- kategori ----
  const CATEGORIES = {
    semua:      { label: "Semua",      icon: "" },
    alam:       { label: "Alam",       icon: "🌿" },
    hewan:      { label: "Hewan",      icon: "🐇" },
    keluarga:   { label: "Keluarga",   icon: "🤍" },
    keseharian: { label: "Keseharian", icon: "🛁" }
  };

  let activeCategory = "semua";

  // ---- render tombol filter ----
  const filterRow = document.getElementById('filterRow');

  function renderFilters(){
    filterRow.innerHTML = '';
    // hanya tampilkan kategori yang benar-benar dipakai oleh cerita, plus "Semua"
    const usedCats = new Set(STORIES.map(s => s.category));
    const catKeys = ['semua', ...Object.keys(CATEGORIES).filter(k => k !== 'semua' && usedCats.has(k))];

    catKeys.forEach(key => {
      const cat = CATEGORIES[key];
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (key === activeCategory ? ' active' : '');
      btn.type = 'button';
      btn.textContent = cat.icon ? `${cat.icon} ${cat.label}` : cat.label;
      btn.addEventListener('click', () => {
        activeCategory = key;
        renderFilters();
        renderList();
      });
      filterRow.appendChild(btn);
    });
  }

  // ---- render daftar cerita ----
  const listEl = document.getElementById('storyList');
  const emptyNote = document.getElementById('emptyNote');

  function renderList(){
    listEl.innerHTML = '';
    const filtered = activeCategory === 'semua'
      ? STORIES
      : STORIES.filter(s => s.category === activeCategory);

    filtered.forEach(story => {
      const card = document.createElement('div');
      card.className = 'story-card';
      card.tabIndex = 0;
      card.setAttribute('role','button');
      card.setAttribute('aria-label', 'Baca cerita: ' + story.title);
      card.innerHTML = `
        <span class="card-icon">${story.icon}</span>
        <span class="card-text">
          <p class="card-title">${story.title}</p>
          <p class="card-desc">${story.desc}</p>
        </span>
        <span class="card-arrow">→</span>
      `;
      card.addEventListener('click', () => openStory(story.id));
      card.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openStory(story.id); }
      });
      listEl.appendChild(card);
    });

    emptyNote.textContent = filtered.length === 0
      ? "Belum ada cerita di kategori ini ✨"
      : "";
  }

  // ---- reader view ----
  const listView = document.getElementById('listView');
  const readerView = document.getElementById('readerView');
  const readerTitle = document.getElementById('readerTitle');
  const readerKicker = document.getElementById('readerKicker');
  const readerBody = document.getElementById('readerBody');
  const backBtn = document.getElementById('backBtn');

  function openStory(id){
    const story = STORIES.find(s => s.id === id);
    if(!story) return;

    readerTitle.textContent = story.title;
    readerKicker.textContent = story.kicker || '';
    readerBody.innerHTML = '';

    story.paragraphs.forEach(p => {
      if(p === '---'){
        const div = document.createElement('div');
        div.className = 'divider';
        div.textContent = '· · ·';
        readerBody.appendChild(div);
      } else {
        const para = document.createElement('p');
        para.innerHTML = p.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g, '<em>$1</em>');
        readerBody.appendChild(para);
      }
    });

    if(story.note){
      const note = document.createElement('div');
      note.className = 'story-note';
      note.textContent = story.note;
      readerBody.appendChild(note);
    }

    listView.classList.add('hidden');
    readerView.classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  backBtn.addEventListener('click', () => {
    readerView.classList.remove('active');
    listView.classList.remove('hidden');
    window.scrollTo({top:0, behavior:'smooth'});
  });

  renderFilters();
  renderList();

  // Halaman daftar cerita akan tampil lebih dulu.
  // (Cerita otomatis terbuka hanya kalau jumlah cerita persis 1.)
  if(STORIES.length === 1){
    openStory(STORIES[0].id);
  }
</script>
